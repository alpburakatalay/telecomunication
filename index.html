<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Terminal Bot</title>

<style>
body {
  background:black;
  color:lime;
  font-family:monospace;
}

#log {
  border:1px solid lime;
  height:300px;
  overflow-y:auto;
  padding:10px;
}

input, button {
  background:black;
  color:lime;
  border:1px solid lime;
  padding:10px;
}
</style>
</head>

<body>

<h2>Terminal Bot</h2>

<div id="log">hazır...</div>
<br>

<input id="input" placeholder="yaz..." />
<button onclick="send()">Gönder</button>

<script>

const TOKEN = "8860095866:AAGgVTzSd3FEnj_s9hmDbKO0lRofm2aQ8c0";
const CHAT_ID = "8510264483";

let lastUpdateId = 0;

function log(t){
  document.getElementById("log").innerHTML += "<br>> " + t;
}

/* 🚀 MESAJ GÖNDER */
async function send(){
  let text = document.getElementById("input").value;
  if(!text) return;

  log("sen: " + text);

  fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage`, {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({
      chat_id: CHAT_ID,
      text: text
    })
  });

  document.getElementById("input").value="";
  log("gönderildi ✔");
}

/* ⌨️ ENTER */
document.getElementById("input").addEventListener("keydown", function(e){
  if(e.key === "Enter"){
    send();
  }
});

/* 📥 GELEN MESAJLAR (FIXLİ - TEKRARSIZ) */
setInterval(async () => {

  let res = await fetch(`https://api.telegram.org/bot${TOKEN}/getUpdates`);
  let data = await res.json();

  data.result.forEach(u => {

    if (u.update_id > lastUpdateId && u.message) {

      lastUpdateId = u.update_id;

      let user = u.message.from.first_name || "user";
      let text = u.message.text;

      log(user + ": " + text);
    }

  });

}, 2000);

</script>

</body>
</html>

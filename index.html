<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Terminal Bot</title>

<style>

body{
  background:black;
  color:lime;
  font-family:monospace;
  padding:20px;
}

#log{
  border:1px solid lime;
  height:300px;
  overflow-y:auto;
  padding:10px;
  margin-top:10px;
}

input, button{
  background:black;
  color:lime;
  border:1px solid lime;
  padding:10px;
  font-family:monospace;
}

#terminal{
  display:none;
}

</style>
</head>

<body>

<!-- 🔐 GİRİŞ -->

<div id="login">

<h2>Şirket Terminali</h2>

<p>Yetkili erişim gerekli.</p>

<input type="password" id="password" placeholder="şifre gir">
<button onclick="checkPassword()">Giriş</button>

<p id="status">config yükleniyor...</p>

</div>

<!-- 💻 TERMİNAL -->

<div id="terminal">

<h2>Terminal Bot</h2>

<div id="log">hazır...</div>

<br>

<input id="input" placeholder="mesaj yaz...">
<button onclick="send()">Gönder</button>

</div>

<script>

/* =========================
   CONFIG
========================= */

let TOKEN = "";
let CHAT_ID = "";
let SITE_PASSWORD = "";

let lastUpdateId = 0;

/* =========================
   CONFIG YÜKLE
========================= */

async function loadConfig(){

  try{

    const res = await fetch(
      "https://raw.githubusercontent.com/KULLANICI/REPO/main/config.json"
    );

    const data = await res.json();

    TOKEN = data.token;
    CHAT_ID = data.chat_id;
    SITE_PASSWORD = data.password;

    document.getElementById("status").innerHTML =
      "sistem hazır ✔";

    console.log("config yüklendi");

  } catch(err){

    document.getElementById("status").innerHTML =
      "config yüklenemedi ❌";

    console.error(err);

  }

}

loadConfig();

/* =========================
   LOG
========================= */

function log(t){

  document.getElementById("log").innerHTML +=
    "<br>> " + t;

  document.getElementById("log").scrollTop =
    document.getElementById("log").scrollHeight;

}

/* =========================
   ŞİFRE KONTROL
========================= */

function checkPassword(){

  let p =
    document.getElementById("password").value;

  if(p === SITE_PASSWORD){

    document.getElementById("login").style.display =
      "none";

    document.getElementById("terminal").style.display =
      "block";

    log("erişim verildi ✔");

  } else {

    alert("yanlış şifre");

  }

}

/* =========================
   MESAJ GÖNDER
========================= */

async function send(){

  let text =
    document.getElementById("input").value;

  if(!text) return;

  log("sen: " + text);

  await fetch(
    `https://api.telegram.org/bot${TOKEN}/sendMessage`,
    {
      method:"POST",

      headers:{
        "Content-Type":"application/json"
      },

      body: JSON.stringify({
        chat_id: CHAT_ID,
        text: text
      })
    }
  );

  document.getElementById("input").value = "";

  log("gönderildi ✔");

}

/* =========================
   ENTER TUŞU
========================= */

document
.getElementById("input")
.addEventListener("keydown", function(e){

  if(e.key === "Enter"){
    send();
  }

});

/* =========================
   GELEN MESAJLAR
========================= */

setInterval(async () => {

  if(!TOKEN) return;

  try{

    let res = await fetch(
      `https://api.telegram.org/bot${TOKEN}/getUpdates`
    );

    let data = await res.json();

    data.result.forEach(u => {

      if(
        u.update_id > lastUpdateId &&
        u.message
      ){

        lastUpdateId = u.update_id;

        let user =
          u.message.from.first_name || "user";

        let text =
          u.message.text || "";

        log(user + ": " + text);

      }

    });

  } catch(err){

    console.error(err);

  }

}, 2000);

</script>

</body>
</html>
